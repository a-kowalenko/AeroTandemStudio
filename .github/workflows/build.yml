name: Build Aero Tandem Studio Releases

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0)
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install NSIS
        run: |
          choco install nsis
          
      - name: Download VLC and FFmpeg dependencies
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dependency_installer"
          $vlcOutFile = "dependency_installer/vlc-3.0.21-win64.exe"
          $vlcUrls = @(
            "https://get.videolan.org/vlc/3.0.21/win64/vlc-3.0.21-win64.exe",
            "https://download.videolan.org/pub/videolan/vlc/3.0.21/win64/vlc-3.0.21-win64.exe"
          )
          $vlcDownloaded = $false
          foreach ($vlcUrl in $vlcUrls) {
            try {
              Invoke-WebRequest -Uri $vlcUrl -OutFile $vlcOutFile
              $vlcDownloaded = $true
              break
            } catch {
              Write-Host "Failed to download VLC from $vlcUrl, trying next source..."
            }
          }
          if (-not $vlcDownloaded) {
            throw "Could not download VLC installer from any configured HTTPS source."
          }
          function Test-FFmpegArchive {
            param(
              [Parameter(Mandatory = $true)][string]$ZipPath
            )

            if (-not (Test-Path $ZipPath)) { return $false }
            $zipItem = Get-Item $ZipPath -ErrorAction SilentlyContinue
            if (-not $zipItem -or $zipItem.Length -le 0) { return $false }

            $extractPath = "temp_ffmpeg_validate"
            if (Test-Path $extractPath) { Remove-Item -Path $extractPath -Recurse -Force }

            try {
              Expand-Archive -Path $ZipPath -DestinationPath $extractPath -Force
              $ffmpegExe = Get-ChildItem -Path $extractPath -Recurse -File -Filter "ffmpeg.exe" | Select-Object -First 1
              return [bool]$ffmpegExe
            } catch {
              return $false
            } finally {
              if (Test-Path $extractPath) {
                Remove-Item -Path $extractPath -Recurse -Force
              }
            }
          }

          $ffmpegUrls = @(
            "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip",
            "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          )
          $tempFfmpegZip = "temp_ffmpeg.zip"
          $ffmpegDownloaded = $false
          $failedFfmpegSources = @()

          foreach ($ffmpegUrl in $ffmpegUrls) {
            try {
              if (Test-Path $tempFfmpegZip) { Remove-Item -Path $tempFfmpegZip -Force }
              Invoke-WebRequest -Uri $ffmpegUrl -OutFile $tempFfmpegZip
              if (Test-FFmpegArchive -ZipPath $tempFfmpegZip) {
                Write-Host "FFmpeg downloaded and validated from $ffmpegUrl"
                $ffmpegDownloaded = $true
                break
              }
              $failedFfmpegSources += "$ffmpegUrl (invalid archive or ffmpeg.exe missing)"
              Write-Host "Downloaded FFmpeg archive from $ffmpegUrl but validation failed, trying next source..."
            } catch {
              $failedFfmpegSources += "$ffmpegUrl ($($_.Exception.Message))"
              Write-Host "Failed to download FFmpeg from $ffmpegUrl, trying next source..."
            }
          }

          if (-not $ffmpegDownloaded) {
            throw "Could not download a valid FFmpeg archive from any configured source. Tried: $($failedFfmpegSources -join '; ')"
          }

          Expand-Archive -Path $tempFfmpegZip -DestinationPath "temp_ffmpeg" -Force
          $RootDir = Get-ChildItem "temp_ffmpeg" -Directory | Select-Object -First 1
          if (-not $RootDir) {
            throw "FFmpeg archive extracted but no root directory was found."
          }
          Compress-Archive -Path "$($RootDir.FullName)\*" -DestinationPath "dependency_installer\ffmpeg-windows-essentials.zip" -Force
          Remove-Item -Path "temp_ffmpeg" -Recurse -Force
          Remove-Item -Path $tempFfmpegZip -Force

      - name: Build Windows Installer
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python build.py setup

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: '*.exe'

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libvlc-dev ffmpeg libzbar0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Linux Tarball
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python build.py setup

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: '*.tar.gz'

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          brew install python-tk zbar ffmpeg vlc create-dmg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build MacOS Release
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python build.py setup

      - name: Upload MacOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: '*.dmg'

  create-release:
    needs: [build-windows, build-linux, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-tarball
          path: artifacts

      - name: Download MacOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
